<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Savings Tracker</h1>
        
        <div class="input-group">
            <label>Savings Goal ($):</label>
            <input type="number" id="goalInput" placeholder="Enter goal...">
        </div>

        <div class="input-group">
            <label>Current Savings ($):</label>
            <input type="number" id="savingsInput" placeholder="Enter current amount...">
        </div>

        <button onclick="saveData()">Save Progress</button>

        <div class="display">
            <p>Total Saved: <span id="displaySavings">$0</span></p>
            <p>Remaining: <span id="displayRemaining">$0</span></p>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
