<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-overlay"></div>

    <div class="app-card">
        <header>
            <h1>My Savings</h1>
            <div class="goal-tag">Goal: <span id="goalValue">0</span> MAD</div>
        </header>

        <div class="progress-section">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-labels">
                <span id="progressText">0%</span>
                <span id="displayRemaining">0 MAD left</span>
            </div>
        </div>

        <div class="total-display">
            <span class="label">Total Balance</span>
            <h2 id="displaySavings">0 MAD</h2>
        </div>

        <div class="chart-container">
            <canvas id="savingsChart"></canvas>
        </div>

        <div class="calendar-container">
            <div class="calendar-nav">
                <select id="monthSelect" onchange="renderCalendar()"></select>
                <select id="yearSelect" onchange="renderCalendar()"></select>
            </div>
            <div class="calendar-days-header">
                <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="action-area">
            <input type="number" id="amountInput" placeholder="Amount (MAD)">
            <div class="btn-group">
                <button onclick="modifySavings('add')" class="add-btn">+ Add</button>
                <button onclick="modifySavings('sub')" class="sub-btn">- Minus</button>
            </div>
        </div>

        <div class="settings-area">
            <div class="goal-input-group">
                <input type="number" id="goalInput" placeholder="Set Goal">
                <button onclick="updateGoal()" class="goal-btn">Set</button>
            </div>
        </div>

        <div class="history">
            <h3>Recent Activity</h3>
            <ul id="historyList"></ul>
            <button onclick="clearAll()" class="clear-btn">Reset All Data</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
