<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Tracker MAD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <header>
            <h1>My Savings</h1>
            <div class="goal-tag">Goal: <span id="goalValue">0</span> MAD</div>
        </header>

        <div class="progress-section">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="progress-labels">
                <span id="progressText">0%</span>
                <span id="displayRemaining">0 MAD left</span>
            </div>
        </div>

        <div class="total-display">
            <span class="label">Total Balance</span>
            <h2 id="displaySavings">0 MAD</h2>
        </div>

        <div class="action-area">
            <input type="number" id="amountInput" placeholder="Amount (MAD)">
            <div class="btn-group">
                <button onclick="modifySavings('add')" class="btn add-btn">+ Add</button>
                <button onclick="modifySavings('sub')" class="btn sub-btn">- Minus</button>
            </div>
        </div>

        <div class="settings-area">
            <input type="number" id="goalInput" placeholder="Set New Goal">
            <button onclick="updateGoal()" class="btn-small">Update Goal</button>
        </div>

        <div class="history">
            <h3>Recent Activity</h3>
            <ul id="historyList"></ul>
            <button onclick="clearAll()" class="clear-btn">Reset All Data</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
