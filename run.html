<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        #score-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; }
        #score-val { font-size: 40px; font-weight: 900; text-shadow: 0 0 10px #00cfff, 3px 3px 0 #000; }
        
        #stats-left { position: absolute; top: 20px; left: 20px; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #444; }
        
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.8); pointer-events: all; z-index: 100; 
        }
        .box { 
            background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 40px; 
            border-radius: 20px; text-align: center; border: 3px solid #00cfff;
            box-shadow: 0 0 50px rgba(0, 207, 255, 0.3);
        }
        .btn { 
            padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; 
            border-radius: 10px; cursor: pointer; background: #00cfff; color: #000;
            transition: 0.2s; margin-top: 20px;
        }
        .btn:hover { transform: scale(1.1); background: #0080ff; }
        #hint { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui">
    <div id="score-panel">
        <div id="score-val">0</div>
        <div style="color: #ffd700;">🪙 <span id="coin-val">0</span></div>
    </div>
    <div id="stats-left">
        <div class="stat-box">HP: <span id="hp-val">❤️❤️❤️</span></div>
        <div class="stat-box" id="mode-tag" style="display:none; color:#a0f">◈ AUTOPILOT ◈</div>
    </div>
</div>

<div id="overlay">
    <div class="box">
        <h1 style="font-size: 48px; margin-bottom: 10px;">SUBWAY SURFERS</h1>
        <p style="color: #aaa;">Browser Edition v2.0</p>
        <button class="btn" id="start-btn">START RUN</button>
        <div id="hint">Lanes: ← → | Jump: SPACE | Autopilot: A | God Mode: G</div>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

// Game State
const G = {
    alive: false,
    score: 0,
    coins: 0,
    hp: 3,
    lane: 0,       // -1, 0, 1
    targetLane: 0,
    x: 0,          // Current visual x
    y: 0,          // Current visual y (jump)
    vy: 0,
    wz: 0,         // World distance
    speed: 15,
    obstacles: [],
    nextObs: 0.5,
    autopilot: false,
    god: false,
    invincibility: 0
};

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function worldToScreen(wx, wy, wz) {
    const horizon = H * 0.4;
    const perspective = 1 / (wz + 1);
    const sx = W / 2 + (wx * W * 0.5) * perspective;
    const sy = horizon + (H - horizon) * (1 - perspective) - (wy * H * 0.5) * perspective;
    return { x: sx, y: sy, scale: perspective };
}

function spawnObstacle() {
    const lane = Math.floor(Math.random() * 3) - 1;
    const type = Math.random() > 0.5 ? 'train' : 'barrier';
    G.obstacles.push({ lane, type, wz: G.wz + 2 });
}

function update(dt) {
    if (!G.alive) return;

    G.wz += G.speed * dt * 0.1;
    G.score += Math.floor(G.speed * dt);
    
    // Lane interpolation
    G.x += (G.targetLane - G.x) * 12 * dt;

    // Jump Gravity
    if (G.y > 0 || G.vy !== 0) {
        G.vy -= 50 * dt;
        G.y += G.vy * dt;
        if (G.y < 0) { G.y = 0; G.vy = 0; }
    }

    // Spawning
    if (G.wz > G.nextObs) {
        spawnObstacle();
        G.nextObs = G.wz + 0.4 + Math.random() * 0.6;
    }

    // Collision
    G.obstacles = G.obstacles.filter(o => {
        const dist = o.wz - G.wz;
        if (dist < 0.1 && dist > -0.1 && Math.abs(o.lane - G.targetLane) < 0.1) {
            if (!G.god && G.invincibility <= 0) {
                G.hp--;
                G.invincibility = 1.5;
                if (G.hp <= 0) G.alive = false;
            }
        }
        return dist > -0.2;
    });

    if (G.invincibility > 0) G.invincibility -= dt;

    // Autopilot AI
    if (G.autopilot) {
        const danger = G.obstacles.find(o => o.wz - G.wz < 0.5 && o.wz - G.wz > 0);
        if (danger && danger.lane === G.targetLane) {
            G.targetLane = (G.targetLane === 1) ? 0 : (G.targetLane === -1) ? 0 : 1;
        }
    }

    // UI
    document.getElementById('score-val').innerText = G.score;
    document.getElementById('hp-val').innerText = "❤️".repeat(Math.max(0, G.hp));
    if (!G.alive) document.getElementById('overlay').style.display = 'flex';
}

function draw() {
    // Clear and Sky
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#16213e';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.4); ctx.lineTo(W, H * 0.4);
    ctx.lineTo(W, H); ctx.lineTo(0, H);
    ctx.fill();

    // Lanes / Rails
    ctx.strokeStyle = '#0f3460';
    ctx.lineWidth = 2;
    [-0.5, 0.5].forEach(lx => {
        const p1 = worldToScreen(lx, 0, 0);
        const p2 = worldToScreen(lx, 0, 10);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    });

    // Draw Obstacles
    G.obstacles.forEach(o => {
        const pos = worldToScreen(o.lane * 0.5, 0, o.wz - G.wz);
        if (pos.scale <= 0) return;
        
        ctx.fillStyle = o.type === 'train' ? '#e94560' : '#ffd700';
        const w = 120 * pos.scale;
        const h = o.type === 'train' ? 180 * pos.scale : 40 * pos.scale;
        ctx.fillRect(pos.x - w/2, pos.y - h, w, h);
    });

    // Draw Player
    if (G.invincibility > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
    const pPos = worldToScreen(G.x * 0.5, G.y, 0.1);
    ctx.fillStyle = '#00cfff';
    const pw = 60 * pPos.scale;
    const ph = 100 * pPos.scale;
    ctx.fillRect(pPos.x - pw/2, pPos.y - ph, pw, ph);
    // Glow
    ctx.shadowBlur = 15; ctx.shadowColor = '#00cfff';
    ctx.strokeStyle = 'white'; ctx.strokeRect(pPos.x - pw/2, pPos.y - ph, pw, ph);
    ctx.shadowBlur = 0;
}

let lastTime = 0;
function loop(t) {
    const dt = (t - lastTime) / 1000;
    lastTime = t;
    if (dt < 0.1) { // Prevent massive spikes
        update(dt);
        draw();
    }
    requestAnimationFrame(loop);
}

document.getElementById('start-btn').onclick = () => {
    G.alive = true;
    G.hp = 3;
    G.score = 0;
    G.wz = 0;
    G.obstacles = [];
    document.getElementById('overlay').style.display = 'none';
};

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') G.targetLane = Math.max(-1, G.targetLane - 1);
    if (e.key === 'ArrowRight') G.targetLane = Math.min(1, G.targetLane + 1);
    if ((e.key === ' ' || e.key === 'ArrowUp') && G.y === 0) G.vy = 18;
    if (e.key === 'a') {
        G.autopilot = !G.autopilot;
        document.getElementById('mode-tag').style.display = G.autopilot ? 'block' : 'none';
    }
    if (e.key === 'g') G.god = !G.god;
});

// Start the loop
requestAnimationFrame(loop);
</script>

</body>
</html>
