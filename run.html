<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Arial,sans-serif}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#score-panel{position:absolute;top:10px;left:50%;transform:translateX(-50%);text-align:center}
#score-val{font-size:32px;font-weight:bold;color:#fff;text-shadow:0 0 10px #00cfff,2px 2px 0 #000}
#stats-left{position:absolute;top:10px;left:10px}
.badge{padding:4px 10px;background:rgba(0,0,0,0.6);color:#fff;border-radius:15px;margin-bottom:5px;border:1px solid #444}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);pointer-events:all}
.box{background:linear-gradient(135deg,#1a0a3a,#0a1a3a);border:2px solid #00cfff;border-radius:16px;padding:30px;text-align:center;color:#fff}
.btn{padding:12px 30px;background:#00cfff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:15px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
    <div id="score-panel">
        <div id="score-val">0</div>
        <div style="color:#FFD700">🪙 <span id="coins">0</span></div>
    </div>
    <div id="stats-left">
        <div class="badge" id="hp">❤️ ❤️ ❤️</div>
        <div class="badge" id="ap-badge" style="display:none;color:#a0f">AUTOPILOT</div>
    </div>
    <div id="overlay">
        <div class="box">
            <h1>SUBWAY SURFERS</h1>
            <p>ULTIMATE BROWSER EDITION</p>
            <button class="btn" id="play-btn">START RUN</button>
        </div>
    </div>
</div>
<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
window.onresize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };

let G = {
    lane: 0, targetLane: 0, x: 0, y: 0, vy: 0, 
    speed: 15, wz: 0, score: 0, coins: 0, hp: 3,
    alive: false, invt: 0, autopilot: false,
    obs: [], particles: [], decor: [], nextObs: 0.5
};

function worldToScreen(wx, wy, wz) {
    let p = 1 / (wz + 1);
    return { x: W/2 + (wx * W * 0.7) * p, y: (H*0.4) + (H*0.6) * (1-p) - (wy * H * 0.6) * p, s: p };
}

function spawn() {
    let l = Math.floor(Math.random()*3)-1;
    let type = Math.random() > 0.6 ? 'train' : 'barrier';
    G.obs.push({ lane: l, wz: G.wz + 3, type });
}

function update(dt) {
    if (!G.alive) return;
    G.wz += G.speed * dt * 0.1;
    G.score += Math.floor(G.speed * dt);
    G.x += (G.targetLane - G.x) * 12 * dt;
    if (G.y > 0 || G.vy !== 0) { G.vy -= 50 * dt; G.y += G.vy * dt; if (G.y < 0) { G.y = 0; G.vy = 0; } }

    if (G.wz > G.nextObs) { spawn(); G.nextObs = G.wz + 0.4 + Math.random()*0.5; }

    G.obs = G.obs.filter(o => {
        let dz = o.wz - G.wz;
        if (dz < 0.1 && dz > -0.1 && Math.abs(o.lane - G.targetLane) < 0.2) {
            if (G.y < 0.2 && G.invt <= 0) { G.hp--; G.invt = 1.5; if (G.hp <= 0) G.alive = false; }
        }
        return dz > -0.5;
    });

    if (G.autopilot) {
        let n = G.obs.find(o => o.wz - G.wz < 0.6 && o.wz - G.wz > 0);
        if (n && n.lane === G.targetLane) G.targetLane = G.targetLane === 1 ? 0 : G.targetLane === -1 ? 0 : 1;
    }

    if (G.invt > 0) G.invt -= dt;
    G.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.l -= dt; });
    G.particles = G.particles.filter(p => p.l > 0);
    
    document.getElementById('score-val').innerText = G.score;
    document.getElementById('coins').innerText = G.coins;
    document.getElementById('hp').innerText = "❤️ ".repeat(Math.max(0, G.hp));
}

function draw() {
    // Background & Rails
    let g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#050510'); g.addColorStop(0.4,'#1a1a3e');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,H*0.4,W,H*0.6);

    // Track Rails
    ctx.strokeStyle = '#240046'; ctx.lineWidth = 3;
    [-0.6, -0.2, 0.2, 0.6].forEach(rx => {
        let p1 = worldToScreen(rx, 0, 0), p2 = worldToScreen(rx, 0, 5);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    });

    // Environment Decor (Buildings)
    for(let i=0; i<12; i++) {
        let bz = (i * 1.8) - (G.wz % 1.8);
        [-1.8, 1.8].forEach(sx => {
            let p = worldToScreen(sx, 0, bz);
            ctx.fillStyle = '#0f0f2d'; ctx.fillRect(p.x - (300*p.s), p.y - (800*p.s), 600*p.s, 800*p.s);
        });
    }

    // Obstacles
    G.obs.forEach(o => {
        let p = worldToScreen(o.lane * 0.45, 0, o.wz - G.wz);
        ctx.fillStyle = o.type === 'train' ? '#2244aa' : '#ffcc00';
        let w = 150 * p.s, h = (o.type === 'train' ? 200 : 50) * p.s;
        ctx.fillRect(p.x - w/2, p.y - h, w, h);
        ctx.strokeStyle = '#fff'; ctx.strokeRect(p.x - w/2, p.y - h, w, h);
    });

    // Player Model
    if (!(G.invt > 0 && Math.floor(Date.now()/100)%2)) {
        let p = worldToScreen(G.x * 0.45, G.y, 0.15);
        ctx.fillStyle = '#00cfff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00cfff';
        ctx.fillRect(p.x - 25, p.y - 70, 50, 70); ctx.shadowBlur = 0;
        // Head
        ctx.fillStyle = '#fff'; ctx.fillRect(p.x - 15, p.y - 90, 30, 25);
    }
}

let last = 0;
function loop(t) {
    let dt = Math.min(0.1, (t - last) / 1000); last = t;
    update(dt); draw(); requestAnimationFrame(loop);
}

document.getElementById('play-btn').onclick = () => {
    G.alive = true; G.hp = 3; G.score = 0; G.wz = 0; G.obs = [];
    document.getElementById('overlay').style.display = 'none';
};

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') G.targetLane = Math.max(-1, G.targetLane - 1);
    if (e.key === 'ArrowRight') G.targetLane = Math.min(1, G.targetLane + 1);
    if ((e.key === 'ArrowUp' || e.key === ' ') && G.y === 0) G.vy = 22;
    if (e.key === 'a') { G.autopilot = !G.autopilot; document.getElementById('ap-badge').style.display = G.autopilot ? 'block' : 'none'; }
};
requestAnimationFrame(loop);
</script>
</body>
</html>
