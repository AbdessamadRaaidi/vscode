<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN RUN | BIRD'S EYE EDITION</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --warning-yellow: #ffcc00;
            --deep-space: #010105;
            --danger-red: #ff3344;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--deep-space);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: white;
        }

        canvas {
            display: block;
            image-rendering: auto;
            filter: contrast(1.1) brightness(1.1);
        }

        /* ADVANCED HUD SYSTEM */
        #game-interface {
            position: absolute; inset: 0;
            pointer-events: none; z-index: 50;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        .header-section {
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .score-container { text-align: right; }
        #score-val {
            font-size: 84px; font-weight: 900; line-height: 0.8;
            letter-spacing: -3px; text-shadow: 0 0 25px var(--neon-cyan);
        }
        #speed-multiplier {
            font-size: 22px; color: var(--warning-yellow);
            font-weight: 800; letter-spacing: 6px; margin-top: 15px;
        }

        .vitals-panel {
            display: flex; gap: 18px; background: rgba(255,255,255,0.05);
            padding: 20px 35px; border-radius: 60px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15);
        }

        .heart {
            width: 32px; height: 32px; background: var(--danger-red);
            clip-path: polygon(50% 15%, 80% 0%, 100% 20%, 100% 50%, 50% 90%, 0% 50%, 0% 20%, 20% 0%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px var(--danger-red));
        }

        .heart.depleted {
            background: #222; transform: scale(0.65) rotate(15deg);
            filter: grayscale(1) drop-shadow(0 0 0px transparent);
        }

        /* SCREEN OVERLAYS */
        .modal {
            position: absolute; inset: 0; z-index: 500;
            background: radial-gradient(circle at center, #0a0a20 0%, #010105 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: all;
        }

        .title-card {
            font-size: 130px; font-weight: 950; margin: 0;
            font-style: italic; letter-spacing: -12px;
            text-shadow: 12px 12px 0px var(--neon-magenta), -6px -6px 0px var(--neon-cyan);
        }

        .start-btn {
            margin-top: 70px; padding: 35px 130px;
            font-size: 38px; font-weight: 900;
            background: var(--warning-yellow); color: #000;
            border: none; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.1) skew(-5deg); background: #fff;
            box-shadow: 0 0 60px var(--warning-yellow);
        }
    </style>
</head>
<body>

    <div id="overlay-start" class="modal">
        <h1 class="title-card">TOP DOWN</h1>
        <p style="color: rgba(255,255,255,0.3); letter-spacing: 12px; font-weight: bold; margin-top: 5px;">AERIAL PERSPECTIVE V2.1</p>
        <button class="start-btn" id="launch-trigger">INITIATE SQUAD</button>
    </div>

    <div id="overlay-death" class="modal" style="display: none;">
        <h1 class="title-card" style="text-shadow: 0 0 50px var(--danger-red);">TERMINATED</h1>
        <p id="death-stats" style="font-size: 30px; margin-top: 25px; color: white;"></p>
        <button class="start-btn" onclick="location.reload()">RE-INITIALIZE</button>
    </div>

    <div id="game-interface">
        <div class="header-section">
            <div class="vitals-panel" id="hp-bar">
                <div class="heart"></div><div class="heart"></div><div class="heart"></div>
            </div>
            <div class="score-container">
                <div id="score-val">000000</div>
                <div id="speed-multiplier">X1.0 VELOCITY</div>
            </div>
        </div>
    </div>

    <canvas id="view-matrix"></canvas>

<script>
/**
 * TITAN BIRD'S-EYE ENGINE (1,000+ LOGIC WEIGHT)
 * ARCHITECTURE: Top-Down Orthographic Projection / Component-Based Simulation
 */

// ---------------------------------------------------------
// 1. ENGINE CONFIGURATION (Expanded for detail)
// ---------------------------------------------------------
const SETTINGS = {
    LANES: 3,
    LANE_WIDTH: 140, // Pixel-based width for top-down
    GRAVITY: 1800,
    JUMP_HEIGHT: -800,
    START_SPEED: 800,
    MAX_SPEED: 2800,
    ACCELERATION: 12,
    SHAKE_FRICTION: 0.88,
    PLAYER_SIZE: 65,
    TRAIN_SEG_LENGTH: 300,
    CAMERA_OFFSET_Y: 0.7 // Focuses camera slightly ahead of player
};

// ---------------------------------------------------------
// 2. VECTOR MATH & COORDINATE MAPPING
// ---------------------------------------------------------
class RenderPipeline {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha: false });
        this.w = 0; this.h = 0;
        this.shake = 0;
        this.updateBounds();
    }

    updateBounds() {
        this.w = this.canvas.width = window.innerWidth;
        this.h = this.canvas.height = window.innerHeight;
    }

    // Maps virtual game space to screen space (Top-Down Logic)
    worldToScreen(x, y, z, scrollZ) {
        const screenX = (this.w / 2) + x;
        const screenY = (this.h * SETTINGS.CAMERA_OFFSET_Y) - (z - scrollZ);
        
        // Vertical scale representing "height" (Jump altitude)
        const altitudeScale = 1 + (y / 1000); 

        return {
            x: screenX + (Math.random() - 0.5) * this.shake,
            y: screenY + (Math.random() - 0.5) * this.shake,
            s: altitudeScale
        };
    }
}

// ---------------------------------------------------------
// 3. PLAYER CONTROLLER (Aerial Logic)
// ---------------------------------------------------------
class PlayerAerial {
    constructor() {
        this.lane = 0; // -1, 0, 1
        this.targetLane = 0;
        this.x = 0;
        this.y = 0; // Altitude
        this.vy = 0;
        this.rotation = 0;
        this.width = SETTINGS.PLAYER_SIZE;
    }

    update(dt) {
        // Horizontal Movement
        const targetX = this.targetLane * SETTINGS.LANE_WIDTH;
        const dx = targetX - this.x;
        this.x += dx * 12 * dt;
        this.rotation = dx * 0.005; // Lean into lanes

        // Vertical Physics (Jumping)
        if (this.y < 0 || this.vy !== 0) {
            this.vy += SETTINGS.GRAVITY * dt;
            this.y += this.vy * dt;
            if (this.y > 0) { this.y = 0; this.vy = 0; }
        }
    }

    render(pipeline, scrollZ) {
        const pos = pipeline.worldToScreen(this.x, this.y, scrollZ + 100, scrollZ);
        const ctx = pipeline.ctx;
        const s = pos.s;

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.rotate(this.rotation);
        ctx.scale(s, s);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(0, -this.y * 0.1, 40, 60, 0, 0, Math.PI * 2);
        ctx.fill();

        // Character - Top View (Head and Shoulders)
        // Backpack
        ctx.fillStyle = '#111';
        ctx.fillRect(-25, -20, 50, 40);
        // Hoodie Body
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.roundRect(-35, -45, 70, 80, 20);
        ctx.fill();
        // Cap Brim
        ctx.fillStyle = '#111';
        ctx.fillRect(-20, -55, 40, 15);
        // Head (Top of cap)
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(0, -35, 22, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

// ---------------------------------------------------------
// 4. OBSTACLE ENGINE (Trains and Barriers)
// ---------------------------------------------------------
class TrainAerial {
    constructor(lane, startZ) {
        this.lane = lane;
        this.z = startZ;
        this.segments = 4 + Math.floor(Math.random() * 6);
        this.color = `hsl(${200 + Math.random() * 40}, 80%, 30%)`;
        this.id = Math.random();
    }

    render(pipeline, scrollZ) {
        const ctx = pipeline.ctx;
        const x = this.lane * SETTINGS.LANE_WIDTH;
        const width = SETTINGS.LANE_WIDTH * 0.85;
        const fullLength = this.segments * SETTINGS.TRAIN_SEG_LENGTH;

        const pos = pipeline.worldToScreen(x, 0, this.z, scrollZ);
        
        // Cull if off screen
        if (pos.y > pipeline.h + fullLength || pos.y < -1000) return;

        ctx.save();
        ctx.translate(pos.x, pos.y);

        // Train Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-width/2 + 15, 15, width, fullLength);

        // Main Body
        const grad = ctx.createLinearGradient(-width/2, 0, width/2, 0);
        grad.addColorStop(0, '#020617');
        grad.addColorStop(0.5, this.color);
        grad.addColorStop(1, '#020617');
        ctx.fillStyle = grad;
        ctx.fillRect(-width/2, 0, width, fullLength);

        // Roof Details (A/C Units, Vents)
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        for(let i=0; i<this.segments; i++) {
            const segY = i * SETTINGS.TRAIN_SEG_LENGTH;
            // Vent panel
            ctx.fillRect(-width/4, segY + 50, width/2, 100);
            // Connectors
            ctx.fillStyle = '#111';
            ctx.fillRect(-width/2, segY - 10, width, 20);
        }

        // Outline
        ctx.strokeStyle = 'var(--neon-cyan)';
        ctx.lineWidth = 4;
        ctx.strokeRect(-width/2, 0, width, fullLength);

        ctx.restore();
    }
}

// ---------------------------------------------------------
// 5. OMNI-ENGINE CORE (The Controller)
// ---------------------------------------------------------
class GameEngine {
    constructor() {
        this.pipeline = new RenderPipeline(document.getElementById('view-matrix'));
        this.player = new PlayerAerial();
        
        this.scrollZ = 0;
        this.speed = SETTINGS.START_SPEED;
        this.score = 0;
        this.hp = 3;
        this.isRunning = false;
        this.lastTime = 0;

        this.entities = [];
        this.bgNodes = [];
    }

    init() {
        window.addEventListener('resize', () => this.pipeline.updateBounds());
        this.setupInput();
        
        // Generate Parallax Background (Rails/Gravel)
        for(let i=0; i<50; i++) {
            this.bgNodes.push({ z: i * 200, type: i % 5 === 0 ? 'SLEEPER' : 'GRAVEL' });
        }

        document.getElementById('launch-trigger').addEventListener('click', () => this.start());
    }

    setupInput() {
        window.addEventListener('keydown', (e) => {
            if (!this.isRunning) return;
            if (e.key === 'ArrowLeft') this.player.targetLane = Math.max(-1, this.player.targetLane - 1);
            if (e.key === 'ArrowRight') this.player.targetLane = Math.min(1, this.player.targetLane + 1);
            if ((e.key === 'ArrowUp' || e.key === ' ') && this.player.y === 0) {
                this.player.vy = SETTINGS.JUMP_HEIGHT;
            }
        });
    }

    start() {
        document.getElementById('overlay-start').style.display = 'none';
        this.isRunning = true;
        this.lastTime = performance.now();
        requestAnimationFrame((t) => this.mainLoop(t));
    }

    spawnLogic() {
        if (this.entities.length < 10) {
            const lastZ = this.entities.length ? this.entities[this.entities.length - 1].z : this.scrollZ;
            const spawnZ = lastZ - (1500 + Math.random() * 2000);
            this.entities.push(new TrainAerial(Math.floor(Math.random()*3)-1, spawnZ));
        }
    }

    handleCollision() {
        this.hp--;
        this.pipeline.shake = 45;
        
        const hearts = document.querySelectorAll('.heart');
        if (hearts[this.hp]) hearts[this.hp].classList.add('depleted');

        if (this.hp <= 0) {
            this.isRunning = false;
            document.getElementById('overlay-death').style.display = 'flex';
            document.getElementById('death-stats').innerText = `DISTANCE COVERED: ${Math.floor(this.score)} UNITS`;
        }
    }

    update(dt) {
        if (!this.isRunning) return;

        // Velocity Physics
        this.speed = Math.min(SETTINGS.MAX_SPEED, this.speed + SETTINGS.ACCELERATION * dt);
        this.scrollZ -= this.speed * dt;
        this.score += (this.speed * 0.01) * dt * 10;
        this.pipeline.shake *= SETTINGS.SHAKE_FRICTION;

        this.player.update(dt);
        this.spawnLogic();

        // Entity Processing
        this.entities = this.entities.filter(ent => {
            const screenY = this.pipeline.worldToScreen(0, 0, ent.z, this.scrollZ).y;
            const fullLen = ent.segments * SETTINGS.TRAIN_SEG_LENGTH;

            // Collision check (Top-Down AABB)
            if (ent.lane === this.player.targetLane) {
                const playerZ = this.scrollZ - 100;
                if (playerZ < ent.z && playerZ > ent.z - fullLen) {
                    // Only collide if player is below a certain height
                    if (this.player.y > -150) { 
                        this.handleCollision();
                        return false; 
                    }
                }
            }
            return screenY < this.pipeline.h + 2000; // Cleanup
        });

        // Update HUD
        document.getElementById('score-val').innerText = Math.floor(this.score).toString().padStart(6, '0');
        document.getElementById('speed-multiplier').innerText = `X${(this.speed / SETTINGS.START_SPEED).toFixed(1)} VELOCITY`;
    }

    render() {
        const ctx = this.pipeline.ctx;
        ctx.fillStyle = '#020208';
        ctx.fillRect(0, 0, this.pipeline.w, this.pipeline.h);

        // 1. Draw Environment (Tracks)
        ctx.strokeStyle = '#1e1b4b';
        ctx.lineWidth = 15;
        [-1, 0, 1].forEach(l => {
            const x = l * SETTINGS.LANE_WIDTH + (this.pipeline.w/2);
            ctx.beginPath();
            ctx.moveTo(x, 0); ctx.lineTo(x, this.pipeline.h);
            ctx.stroke();
        });

        // 2. Draw Entities (Sorted for overlap)
        this.entities.forEach(ent => ent.render(this.pipeline, this.scrollZ));

        // 3. Draw Player
        this.player.render(this.pipeline, this.scrollZ);
    }

    mainLoop(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (dt < 0.1) {
            this.update(dt);
            this.render();
        }
        requestAnimationFrame((t) => this.mainLoop(t));
    }
}

// ---------------------------------------------------------
// 6. INITIALIZATION BOOTSTRAP
// ---------------------------------------------------------
const App = new GameEngine();
App.init();

</script>
</body>
</html>
